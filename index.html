<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misha Toyota 3S Nilai | Ejen Sah Toyota</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --toyota-red: #eb0a1e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin-bottom: 70px;
            overflow-x: hidden;
        }

        /* Header */
        .header-top {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .toyota-logo {
            height: 25px; /* Saiz logo lebih kecil supaya muat */
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-size: 0.8rem;
            color: #666;
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            height: 75vh;
            /* Gambar Yaris Rasmi */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), 
                        url('https://www.toyota.com.my/content/dam/toyota/my/models/yaris/yaris-mc/exterior/yaris-exterior-1.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 20px;
        }

        .hero-content h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .hero-content h1 {
            font-weight: 800;
            font-size: 2.2rem;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .price-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        /* Buttons */
        .contact-btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-call {
            background: white;
            color: black;
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-whatsapp {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Car Models */
        .section-title {
            padding: 30px 20px 15px;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .model-card {
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
        }

        .model-card img {
            width: 100%;
            max-width: 180px;
            height: auto;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #999;
            text-decoration: none;
            font-size: 0.7rem;
        }

        .nav-item i {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: var(--toyota-red);
        }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Toyota_Logo.svg/2560px-Toyota_Logo.svg.png" alt="Toyota Logo" class="toyota-logo">
        <div class="tagline">Move your world</div>
        <i class="fas fa-bars fa-lg text-dark"></i>
    </div>

    <div class="hero-section">
        <div class="hero-content">
            <h2>Misha Toyota 3S Nilai</h2>
            <h1>YOUR ERA,<br>YOUR DRIP,<br>YOUR VIBE</h1>
            <p class="price-text">From RM88,000.00</p>
            
            <div class="contact-btn-container">
                <a href="tel:+60189801186" class="btn-call">
                    <i class="fas fa-user-circle me-2"></i> HUBUNGI MISHA @ 018-9801186
                </a>
                <a href="https://wa.me/60189801186" class="btn-whatsapp">
                    <i class="fab fa-whatsapp me-2"></i> WHATSAPP
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <h3 class="section-title">MODEL-MODEL TOYOTA LAIN</h3>
        <div class="row row-cols-2 g-3">
            <div class="col">
                <div class="model-card">
                    <img src="https://img.gaadicdn.com/way2speed/toyota/vios/toyota-vios-front-left-side-47.jpg" alt="Vios">
                    <h6 class="mt-2">VIOS</h6>
                    <p class="small text-danger fw-bold">From RM89,600</p>
                </div>
            </div>
            <div class="col">
                <div class="model-card">
                    <img src="https://img.gaadicdn.com/way2speed/toyota/hilux/toyota-hilux-front-left-side-47.jpg" alt="Hilux">
                    <h6 class="mt-2">HILUX</h6>
                    <p class="small text-danger fw-bold">From RM103,880</p>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fas fa-home"></i>
            Utama
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-car"></i>
            Model
        </a>
        <a href="tel:+60189801186" class="nav-item">
            <i class="fas fa-phone-alt"></i>
            Hubungi
        </a>
        <a href="https://wa.me/60189801186" class="nav-item">
            <i class="fab fa-whatsapp"></i>
            WhatsApp
        </a>
    </div>

</body>
</html>
